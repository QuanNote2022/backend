server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: mineral-system
  datasource:
    url: jdbc:mysql://localhost:3306/mineral_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: mineral-system-secret-key-2026-graduation-project
  expiration: 86400000
  header: Authorization
  prefix: Bearer 

upload:
  path: ./uploads/
  max-size: 10485760
